<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle de Gastos</title>
    <link rel="stylesheet" href="styles/style.css">
</head>
<body>

<div class="container">
    <h1>Controle Financeiro</h1>

    <p id="cotacao-info">Buscando cotação atual do Guarani...</p>

    <form class="form-container" id="form-transacao">
        <div class="form-group">
            <label for="tipo">Tipo</label>
            <select id="tipo" required>
                <option value="" disabled selected hidden>Selecione o tipo...</option>
                <option value="receita">Recebido</option>
                <option value="despesa">Gasto</option>
            </select>
        </div>

        <div class="form-group">
            <label for="moeda">Moeda</label>
            <select id="moeda" required>
                <option value="" disabled selected hidden>Selecione a moeda...</option>
                <option value="BRL">Real (R$)</option>
                <option value="PYG">Guarani (Gs)</option>
            </select>
        </div>

        <div class="form-group">
            <label for="descricao">Descrição</label>
            <input type="text" id="descricao" placeholder="Ex: Salário, Conta de Luz" required>
        </div>

        <div class="form-group">
            <label for="valor">Valor</label>
            <input type="number" id="valor" step="0.01" min="0.01" placeholder="0.00" required>
        </div>

        <button type="submit">Adicionar</button>
    </form>

    <div class="cards-container">
        <div class="card">
            <h3>Total Recebido</h3>
            <p class="receita" id="total-receitas">R$ 0,00</p>
        </div>
        <div class="card">
            <h3>Total Gasto</h3>
            <p class="despesa" id="total-despesas">R$ 0,00</p>
        </div>
        <div class="card">
            <h3>Balanço Atual</h3>
            <p id="balanco-total">R$ 0,00</p>
        </div>
    </div>

    <div class="historico">
        <h2>Histórico</h2>
        <div id="lista-transacoes"></div>
    </div>
</div>

<script src="scripts/script.js"></script>
</body>
</html>
